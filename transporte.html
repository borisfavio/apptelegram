<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recibo Transporte</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:10px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:6px;
width:100%;
font-size:16px;
}

#recibo{
background:white;
padding:20px;
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<h2>Registro de Transporte</h2>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Responsable</label>
<input id="responsable">

<label>Motivo del gasto</label>
<input id="motivo">

<h3>Transportes</h3>

<table id="tabla">
<thead>
<tr>
<th>Desde</th>
<th>Hasta</th>
<th>Tipo Transporte</th>
<th>Costo</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<button onclick="agregarFila()">➕ Agregar transporte</button>

<button onclick="generarRecibo()">📄 Generar Recibo</button>

<div id="recibo"></div>

<script>

function agregarFila(){

let fila = `
<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" oninput="calcular()"></td>
</tr>
`;

document.getElementById("tbody").innerHTML += fila;

}

function calcular(){

let total=0;

document.querySelectorAll("#tbody tr").forEach(f=>{

let costo=f.children[3].querySelector("input").value;

total += Number(costo || 0);

});

return total;

}

function numeroALetras(num){

const unidades=[
"","Uno","Dos","Tres","Cuatro","Cinco","Seis","Siete","Ocho","Nueve","Diez"
];

if(num<=10) return unidades[num];

return num;

}

function generarRecibo(){

let fecha=document.getElementById("fecha").value;
let responsable=document.getElementById("responsable").value;
let motivo=document.getElementById("motivo").value;

let filasHTML="";
let total=0;

document.querySelectorAll("#tbody tr").forEach(f=>{

let desde=f.children[0].querySelector("input").value;
let hasta=f.children[1].querySelector("input").value;
let tipo=f.children[2].querySelector("input").value;
let costo=f.children[3].querySelector("input").value;

total += Number(costo || 0);

filasHTML += `
<tr>
<td>${desde}</td>
<td>${hasta}</td>
<td>${tipo}</td>
<td>${costo}</td>
</tr>
`;

});

let letras = numeroALetras(total);

let html=`

<h3 style="text-align:center">FUNDACIÓN PASOS DE ESPERANZA</h3>
<h4 style="text-align:center">RECIBO DE GASTO DE TRANSPORTE</h4>

<p><b>Fecha:</b> ${fecha}</p>
<p><b>Responsable:</b> ${responsable}</p>
<p><b>Motivo del gasto:</b> ${motivo}</p>

<table>
<tr>
<th>Desde</th>
<th>Hasta</th>
<th>Tipo Transporte</th>
<th>Costo (Bs)</th>
</tr>

${filasHTML}

<tr>
<td colspan="3"><b>TOTAL</b></td>
<td><b>${total.toFixed(2)}</b></td>
</tr>

</table>

<p><b>SON:</b> ${letras} con 00/100 Bolivianos</p>

<br><br>

<table style="width:100%;border:none">
<tr>
<td style="border:none;text-align:center">
_________________________<br>
Entregué conforme
</td>

<td style="border:none;text-align:center">
_________________________<br>
Recibí conforme
</td>
</tr>
</table>

<button onclick="window.print()">🖨 Imprimir / Guardar PDF</button>

`;

let div=document.getElementById("recibo");

div.innerHTML=html;
div.style.display="block";

}

agregarFila();

</script>

</body>
</html>
