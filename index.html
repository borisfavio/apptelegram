<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Transporte</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
text-align:center;
font-size:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.icon{
font-size:30px;
margin-bottom:10px;
}

section{
display:none;
}

input{
width:95%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:12px;
border-radius:6px;
width:100%;
margin-top:10px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:13px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

.back{
background:#888;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
🚕 Control de Transporte
</header>

<div class="container">

<!-- MENU -->

<section id="menu" style="display:block">

<div id="usuario"></div>

<div class="menu">

<div class="card" onclick="mostrar('registro')">
<div class="icon">🚕</div>
Registrar Transporte
</div>

<div class="card" onclick="mostrar('lista')">
<div class="icon">📋</div>
Ver Registros
</div>

<div class="card" onclick="descargarCSV()">
<div class="icon">📄</div>
Exportar CSV
</div>

<div class="card" onclick="mostrar('misdatos')">
<div class="icon">👤</div>
Mis Datos
</div>

</div>

</section>


<!-- REGISTRO -->

<section id="registro">

<button class="back" onclick="mostrar('menu')">⬅ Volver</button>

<h3>Registrar Transporte</h3>

<input id="conductor" placeholder="Conductor">

<input id="placa" placeholder="Placa">

<input id="origen" placeholder="Origen">

<input id="destino" placeholder="Destino">

<input id="monto" type="number" placeholder="Monto">

<button onclick="agregar()">Guardar</button>

</section>


<!-- LISTA -->

<section id="lista">

<button class="back" onclick="mostrar('menu')">⬅ Volver</button>

<h3>Registros</h3>

<table id="tabla">

<thead>
<tr>
<th>#</th>
<th>Conductor</th>
<th>Placa</th>
<th>Monto</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>


<!-- MIS DATOS -->

<section id="misdatos">

<button class="back" onclick="mostrar('menu')">⬅ Volver</button>

<h3>Mis Datos</h3>

<div id="infoUsuario"></div>

</section>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("usuario").innerHTML=
`👋 Hola ${user.first_name}`;

document.getElementById("infoUsuario").innerHTML=
`
ID: ${user.id}<br>
Nombre: ${user.first_name}<br>
Usuario: ${user.username || "Sin usuario"}
`;

}

let registros = JSON.parse(localStorage.getItem("transportes")) || [];

function mostrar(id){

document.querySelectorAll("section").forEach(s=>{
s.style.display="none";
});

document.getElementById(id).style.display="block";

if(id=="lista"){
actualizarTabla();
}

}

function agregar(){

let conductor=document.getElementById("conductor").value;
let placa=document.getElementById("placa").value;
let origen=document.getElementById("origen").value;
let destino=document.getElementById("destino").value;
let monto=document.getElementById("monto").value;

let fecha=new Date().toLocaleString();

let registro={
conductor,
placa,
origen,
destino,
monto,
fecha
};

registros.push(registro);

localStorage.setItem("transportes",JSON.stringify(registros));

alert("Registro guardado");

document.getElementById("conductor").value="";
document.getElementById("placa").value="";
document.getElementById("origen").value="";
document.getElementById("destino").value="";
document.getElementById("monto").value="";

}

function actualizarTabla(){

let tbody=document.querySelector("#tabla tbody");

tbody.innerHTML="";

registros.forEach((r,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.conductor}</td>
<td>${r.placa}</td>
<td>${r.monto}</td>
</tr>
`;

});

}

function descargarCSV(){

if(registros.length==0){

alert("No hay registros");

return;

}

let csv="Conductor,Placa,Origen,Destino,Monto,Fecha\n";

registros.forEach(r=>{
csv+=`${r.conductor},${r.placa},${r.origen},${r.destino},${r.monto},${r.fecha}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let url=URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;
a.download="transporte.csv";

a.click();

}

</script>

</body>
</html>
